<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse Prism Auth Bridge</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: Inter, system-ui, sans-serif;
            background: #0b1020;
            color: #eef2ff;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at top, rgba(91, 164, 255, 0.2), transparent 28%),
                radial-gradient(circle at bottom right, rgba(157, 113, 255, 0.18), transparent 24%),
                #0b1020;
        }

        .card {
            width: min(420px, calc(100vw - 32px));
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(11, 16, 32, 0.84);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
            padding: 24px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 24px;
        }

        p {
            margin: 0;
            line-height: 1.6;
            color: rgba(238, 242, 255, 0.72);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Redirecting back to Pulse Prism…</h1>
        <p id="status">Completing account sign-in.</p>
    </div>

    <script>
        (() => {
            const params = new URLSearchParams(window.location.search);
            const returnTo = params.get('return_to');
            const status = document.getElementById('status');

            if (!returnTo) {
                status.textContent = 'Missing Pulse Prism return URL.';
                return;
            }

            let target;
            try {
                target = new URL(returnTo);
            } catch {
                status.textContent = 'Invalid Pulse Prism return URL.';
                return;
            }

            const passthrough = ['oauth', 'auth_error', 'userId', 'secret'];
            passthrough.forEach((key) => {
                const value = params.get(key);
                if (value) target.searchParams.set(key, value);
            });

            if (!target.searchParams.has('oauth')) {
                target.searchParams.set('oauth', '1');
            }

            status.textContent = 'Returning to Pulse Prism on GitHub Pages.';
            window.location.replace(target.toString());
        })();
    </script>
</body>
</html>
